name: Build and publish images to GHCR
on:
  push:
    branches:
      - master
  workflow_dispatch:

permissions:
  contents: read
  packages: write

jobs:
  build:
    name: Build and push ${{ matrix.component }} image
    runs-on: ubuntu-latest
    strategy:
      matrix:
        component: [server, client]
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Compute metadata
        id: meta
        run: |
          echo "owner=${GITHUB_REPOSITORY_OWNER,,}" >> "$GITHUB_OUTPUT"
          echo "build_info=custom-${GITHUB_SHA::8}" >> "$GITHUB_OUTPUT"
          echo "build_date=$(date -u +'%Y-%m-%dT%H:%M:%SZ')" >> "$GITHUB_OUTPUT"

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build and push
        uses: docker/build-push-action@v5
        with:
          context: ./${{ matrix.component }}
          platforms: linux/amd64
          push: true
          tags: |
            ghcr.io/${{ steps.meta.outputs.owner }}/szurubooru-${{ matrix.component }}:latest
            ghcr.io/${{ steps.meta.outputs.owner }}/szurubooru-${{ matrix.component }}:${{ github.sha }}
          build-args: |
            BUILD_INFO=${{ steps.meta.outputs.build_info }}
            BUILD_DATE=${{ steps.meta.outputs.build_date }}
            SOURCE_COMMIT=${{ github.sha }}
            DOCKER_REPO=ghcr.io/${{ steps.meta.outputs.owner }}/szurubooru-${{ matrix.component }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
